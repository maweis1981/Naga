<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naga · 引擎监视器</title>
<style>
  :root { --bg:#0e1014; --panel:#171a21; --line:#262b36; --fg:#e6e9ef; --dim:#8b93a3;
          --blue:#2b6bff; --purple:#9b3cff; --green:#2ecc71; --amber:#f5a623; --red:#ff5c6c; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:5; }
  .logo { width:26px; height:26px; border-radius:7px; box-shadow:0 2px 8px rgba(43,92,255,.35); }
  header b { font-size:16px; letter-spacing:.3px; }
  header .sub { color:var(--dim); font-size:12.5px; }
  header .right { margin-left:auto; display:flex; align-items:center; gap:14px; font-size:13px; }
  header a { color:var(--dim); text-decoration:none; } header a:hover { color:var(--fg); }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--red); display:inline-block; }
  .dot.on { background:var(--green); box-shadow:0 0 8px var(--green); }
  .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; padding:16px 20px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .card .k { color:var(--dim); font-size:12px; }
  .card .v { font-size:24px; font-weight:700; margin-top:4px; }
  .card .v small { font-size:13px; color:var(--dim); font-weight:500; }
  .wrap { padding:0 20px 40px; }
  .toolbar { display:flex; align-items:center; gap:10px; margin:6px 0 10px; color:var(--dim); font-size:12.5px; }
  .toolbar button { background:var(--panel); color:var(--dim); border:1px solid var(--line); border-radius:7px; padding:4px 10px; cursor:pointer; }
  .toolbar button:hover { color:var(--fg); }
  .ev { display:flex; gap:12px; align-items:baseline; padding:8px 12px; border:1px solid var(--line); border-left-width:3px; border-radius:9px; background:var(--panel); margin-bottom:7px; }
  .ev .ts { color:var(--dim); font-variant-numeric:tabular-nums; font-size:12px; min-width:62px; }
  .ev .badge { font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:6px; min-width:96px; text-align:center; white-space:nowrap; }
  .ev .body { flex:1; }
  .ev .body b { font-weight:700; }
  .ev .mut { color:var(--dim); }
  .pill { display:inline-block; padding:1px 7px; border-radius:5px; background:#0e1014; border:1px solid var(--line); margin-right:6px; font-variant-numeric:tabular-nums; }
  .pill.hot { color:var(--green); border-color:#1d3b2a; }
  .pill.cool { color:var(--purple); border-color:#2e2342; }
  /* per-kind accent on left border + badge */
  .k-request    { border-left-color:var(--blue);   } .b-request   { background:#16233f; color:#7fa6ff; }
  .k-generation { border-left-color:var(--green);  } .b-generation{ background:#163024; color:#5fe39b; }
  .k-prefix_cache{border-left-color:var(--purple); } .b-prefix_cache{background:#241a36; color:#c79bff; }
  .k-context    { border-left-color:#5a6373;       } .b-context   { background:#1d222c; color:#aab3c2; }
  .k-tool_call  { border-left-color:var(--amber);  } .b-tool_call { background:#332708; color:#f5c45e; }
  .k-tool_result{ border-left-color:var(--amber);  } .b-tool_result{background:#2a2310; color:#e0b65a; }
  .k-model_load { border-left-color:#39c2d7;        } .b-model_load{ background:#0f2e34; color:#5fd6e8; }
  /* 硬件仪表盘 */
  .hw { display:grid; grid-template-columns:repeat(auto-fit,minmax(208px,1fr)); gap:12px; padding:16px 20px 0; }
  .gauge { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .gauge .k { color:var(--dim); font-size:12px; display:flex; justify-content:space-between; gap:8px; }
  .gauge .big { font-size:26px; font-weight:700; margin:3px 0 9px; }
  .gauge .big small { font-size:13px; color:var(--dim); font-weight:500; margin-left:2px; }
  .bar { height:9px; border-radius:5px; background:#0e1014; border:1px solid var(--line); overflow:visible; position:relative; }
  .bar > i { display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--blue),var(--purple)); width:0; transition:width .4s; }
  .bar.warn > i { background:linear-gradient(90deg,var(--amber),var(--red)); }
  .bar .tick { position:absolute; top:-3px; width:2px; height:15px; background:var(--fg); opacity:.55; transition:left .4s; }
  .sub2 { color:var(--dim); font-size:11.5px; margin-top:7px; display:flex; gap:12px; flex-wrap:wrap; }
  .sub2 b { color:var(--fg); font-weight:600; font-variant-numeric:tabular-nums; }
  .cores { display:flex; gap:3px; align-items:flex-end; height:34px; margin-top:4px; }
  .cores i { flex:1; background:var(--green); border-radius:2px 2px 0 0; min-height:2px; transition:height .35s; }
  .cores i.e { background:#39c2d7; }
  .spark { width:100%; height:26px; display:block; margin-top:6px; }
</style>
</head>
<body>
<header>
  <svg class="logo" viewBox="0 0 32 32" fill="none">
    <defs><linearGradient id="ng" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0" stop-color="#2b6bff"/><stop offset="1" stop-color="#9b3cff"/></linearGradient></defs>
    <rect width="32" height="32" rx="8" fill="url(#ng)"/>
    <path d="M9.5 22.5 V9.5 L22.5 22.5 V9.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="22.5" cy="9.5" r="2" fill="#fff"/>
  </svg>
  <div><b>Naga</b> <span class="sub">引擎监视器</span></div>
  <div class="right">
    <span><span class="dot" id="dot"></span> <span id="conn">连接中…</span></span>
    <a href="/">聊天</a><a href="/settings">设置</a>
  </div>
</header>

<div class="hw">
  <div class="gauge">
    <div class="k"><span>CPU 利用率</span><span class="mut" id="hw-dev">—</span></div>
    <div class="big"><span id="cpu-pct">—</span><small>%</small></div>
    <div class="cores" id="cpu-cores"></div>
    <div class="sub2"><span>负载 <b id="cpu-load">—</b></span><span id="cpu-split" class="mut"></span></div>
    <svg class="spark" id="cpu-spark" preserveAspectRatio="none" viewBox="0 0 100 26"><polyline fill="none" stroke="#5fe39b" stroke-width="1.5" points=""/></svg>
  </div>
  <div class="gauge">
    <div class="k"><span>统一内存</span><span class="mut" id="mem-total">—</span></div>
    <div class="big"><span id="mem-used">—</span><small>GB</small></div>
    <div class="bar" id="mem-bar"><i></i></div>
    <div class="sub2"><span><b id="mem-pct">—</b></span><span id="mem-swap" class="mut"></span></div>
  </div>
  <div class="gauge">
    <div class="k"><span>MLX 引擎显存</span><span class="mut" id="vram-max">—</span></div>
    <div class="big"><span id="vram-active">—</span><small>GB</small></div>
    <div class="bar" id="vram-bar"><i></i><span class="tick" id="vram-peak" style="left:0"></span></div>
    <div class="sub2"><span>峰值 <b id="vram-peakv">—</b></span><span>缓存 <b id="vram-cache">—</b></span></div>
    <svg class="spark" id="vram-spark" preserveAspectRatio="none" viewBox="0 0 100 26"><polyline fill="none" stroke="#c79bff" stroke-width="1.5" points=""/></svg>
  </div>
  <div class="gauge">
    <div class="k"><span>Naga 进程</span></div>
    <div class="big"><span id="proc-cpu">—</span><small>% CPU</small></div>
    <div class="bar" id="proc-bar"><i></i></div>
    <div class="sub2"><span>常驻内存 <b id="proc-rss">—</b> GB</span></div>
  </div>
  <div class="gauge">
    <div class="k"><span>GPU 利用率</span><span class="mut" id="gpu-thermal">powermetrics</span></div>
    <div class="big"><span id="gpu-util">—</span><small>%</small></div>
    <div class="bar" id="gpu-bar"><i></i></div>
    <div class="sub2" id="gpu-sub"><span class="mut">未启用</span></div>
    <svg class="spark" id="gpu-spark" preserveAspectRatio="none" viewBox="0 0 100 26"><polyline fill="none" stroke="#f5a623" stroke-width="1.5" points=""/></svg>
  </div>
</div>

<div class="cards">
  <div class="card"><div class="k">当前模型</div><div class="v" id="s-model" style="font-size:16px">—</div></div>
  <div class="card"><div class="k">累计生成请求</div><div class="v" id="s-req">0</div></div>
  <div class="card"><div class="k">平均 decode 速度</div><div class="v"><span id="s-toks">—</span> <small>tok/s</small></div></div>
  <div class="card"><div class="k">平均前缀复用率</div><div class="v"><span id="s-reuse">—</span> <small>%</small></div></div>
</div>

<div class="wrap">
  <div class="toolbar">
    <button id="btn-clear">清空</button>
    <label><input type="checkbox" id="auto" checked> 自动滚动到最新</label>
    <span id="count" class="mut"></span>
  </div>
  <div id="log"></div>
</div>

<script>
const log = document.getElementById('log');
const elDot = document.getElementById('dot'), elConn = document.getElementById('conn');
let nReq = 0, sumToks = 0, nGen = 0, sumReuse = 0, nCache = 0, lastModel = '—';

function fmtTime(t) {
  const d = new Date(t * 1000);
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

const LABEL = {
  request:'REQUEST', generation:'GENERATION', prefix_cache:'PREFIX CACHE',
  context:'CONTEXT', tool_call:'TOOL CALL', tool_result:'TOOL RESULT', model_load:'MODEL LOAD'
};

function render(ev) {
  const body = document.createElement('div');
  if (ev.kind === 'request') {
    body.innerHTML = `<b>${ev.model}</b> <span class="mut">· ${ev.turns} 轮 · 提示 <b>${ev.prompt_tokens}</b> tok</span>`;
  } else if (ev.kind === 'generation') {
    body.innerHTML = `<span class="pill">提示 ${ev.prompt_tokens}</span><span class="pill">生成 ${ev.completion_tokens}</span>`
      + `<span class="pill">TTFT ${ev.ttft_ms}ms</span><span class="pill hot">${ev.decode_tok_s} tok/s</span>`;
  } else if (ev.kind === 'prefix_cache') {
    const pct = Math.round(ev.reuse * 100);
    body.innerHTML = `<span class="pill cool">复用 ${ev.matched}/${ev.total} = ${pct}%</span>`
      + `<span class="pill">实际 prefill ${ev.prefilled} tok</span>`
      + (pct >= 50 ? `<span class="mut">命中前缀，省下重算</span>` : `<span class="mut">几乎全新 prefill</span>`);
  } else if (ev.kind === 'context') {
    body.innerHTML = `<span class="mut">注入</span> <span class="pill">RAG ${ev.rag_docs} 段</span><span class="pill">记忆 ${ev.memories} 条</span>`;
  } else if (ev.kind === 'tool_call') {
    body.innerHTML = `🔧 <b>${ev.name}</b> <span class="mut">${JSON.stringify(ev.arguments)}</span>`;
  } else if (ev.kind === 'tool_result') {
    body.innerHTML = `↩ <b>${ev.name}</b> <span class="mut">${(ev.result||'').slice(0,120)}</span>`;
  } else if (ev.kind === 'model_load') {
    body.innerHTML = `<b>${ev.model}</b> <span class="pill">${ev.quantize}</span><span class="pill">${ev.layers} 层</span>`
      + `<span class="pill">加载 ${ev.load_s}s</span>` + (ev.prefix_cache ? `<span class="mut">前缀缓存开</span>` : '');
  } else {
    body.textContent = JSON.stringify(ev);
  }
  const row = document.createElement('div');
  row.className = 'ev k-' + ev.kind;
  row.innerHTML = `<span class="ts">${fmtTime(ev.t)}</span>`
    + `<span class="badge b-${ev.kind}">${LABEL[ev.kind] || ev.kind}</span>`;
  row.appendChild(body);
  log.prepend(row);
  while (log.children.length > 400) log.removeChild(log.lastChild);
}

function stat(ev) {
  if (ev.kind === 'generation') { nReq++; sumToks += ev.decode_tok_s || 0; if (ev.decode_tok_s) nGen++; lastModel = ev.model; }
  if (ev.kind === 'prefix_cache') { sumReuse += ev.reuse || 0; nCache++; }
  if (ev.kind === 'model_load') lastModel = ev.model + ' (' + ev.quantize + ')';
  document.getElementById('s-req').textContent = nReq;
  document.getElementById('s-model').textContent = lastModel;
  document.getElementById('s-toks').textContent = nGen ? (sumToks / nGen).toFixed(1) : '—';
  document.getElementById('s-reuse').textContent = nCache ? Math.round(sumReuse / nCache * 100) : '—';
  document.getElementById('count').textContent = log.children.length + ' 条事件';
}

const seen = new Set();
function handle(ev) { if (seen.has(ev.seq)) return; seen.add(ev.seq); render(ev); stat(ev); }

const es = new EventSource('/monitor/stream');
es.onopen = () => { elDot.classList.add('on'); elConn.textContent = '已连接'; };
es.onerror = () => { elDot.classList.remove('on'); elConn.textContent = '断线重连…'; };
es.onmessage = e => { try { handle(JSON.parse(e.data)); } catch (_) {} };

document.getElementById('btn-clear').onclick = () => { log.innerHTML = ''; document.getElementById('count').textContent = ''; };

// ---- 硬件资源仪表盘（定时轮询 /monitor/hw）----
let cpuHist = [], vramHist = [];
const $ = id => document.getElementById(id);
function spark(arr, max) {
  if (!arr.length) return '';
  const w = 100 / Math.max(arr.length - 1, 1);
  return arr.map((v, i) => `${(i * w).toFixed(1)},${(26 - Math.min(v / max, 1) * 26).toFixed(1)}`).join(' ');
}
async function pollHw() {
  let d; try { d = await (await fetch('/monitor/hw')).json(); } catch (_) { return; }
  const s = d.sample, st = d.static;
  // CPU
  $('hw-dev').textContent = st.device;
  $('cpu-pct').textContent = s.cpu_overall;
  $('cpu-load').textContent = s.loadavg.join('  ');
  $('cpu-split').textContent = `性能核 ${st.p_cores} · 能效核 ${st.e_cores}`;
  const cc = $('cpu-cores');
  if (cc.children.length !== s.cores.length)
    cc.innerHTML = s.cores.map((_, i) => `<i class="${i >= st.p_cores ? 'e' : ''}"></i>`).join('');
  s.cores.forEach((v, i) => cc.children[i].style.height = Math.max(v / 100 * 34, 2) + 'px');
  cpuHist.push(s.cpu_overall); if (cpuHist.length > 60) cpuHist.shift();
  document.querySelector('#cpu-spark polyline').setAttribute('points', spark(cpuHist, 100));
  // 统一内存
  $('mem-total').textContent = `/ ${s.mem_total_gb} GB`;
  $('mem-used').textContent = s.mem_used_gb;
  const mb = $('mem-bar'); mb.querySelector('i').style.width = s.mem_pct + '%';
  mb.classList.toggle('warn', s.mem_pct > 85);
  $('mem-pct').textContent = s.mem_pct + '% 已用';
  $('mem-swap').textContent = s.swap_gb > 0.05 ? `swap ${s.swap_gb} GB` : '';
  // MLX 显存
  $('vram-max').textContent = `/ ${s.gpu_max_gb} GB 上限`;
  $('vram-active').textContent = s.mlx_active_gb;
  const vp = Math.min(s.mlx_active_gb / s.gpu_max_gb * 100, 100);
  const vb = $('vram-bar'); vb.querySelector('i').style.width = vp + '%';
  vb.classList.toggle('warn', vp > 85);
  $('vram-peak').style.left = Math.min(s.mlx_peak_gb / s.gpu_max_gb * 100, 100) + '%';
  $('vram-peakv').textContent = s.mlx_peak_gb + ' GB';
  $('vram-cache').textContent = s.mlx_cache_gb + ' GB';
  vramHist.push(s.mlx_active_gb); if (vramHist.length > 60) vramHist.shift();
  document.querySelector('#vram-spark polyline').setAttribute('points', spark(vramHist, s.gpu_max_gb));
  // 进程
  $('proc-cpu').textContent = s.proc_cpu;
  $('proc-bar').querySelector('i').style.width = Math.min(s.proc_cpu / st.cpu_total, 100) + '%';
  $('proc-rss').textContent = s.proc_rss_gb;
  // GPU（来自 powermon 守护；未启用则置灰并提示开启命令）
  const p = d.power;
  if (p) {
    $('gpu-util').textContent = (p.gpu_util ?? '—');
    $('gpu-bar').querySelector('i').style.width = (p.gpu_util ?? 0) + '%';
    $('gpu-thermal').textContent = p.thermal ? ('热压力 ' + p.thermal) : 'powermetrics';
    $('gpu-sub').innerHTML = `<span>功耗 <b>${p.gpu_w ?? '—'}</b> W</span>`
      + (p.total_w != null ? `<span>整机 <b>${p.total_w}</b> W</span>` : '')
      + (p.gpu_mhz != null ? `<span>${p.gpu_mhz} MHz</span>` : '');
    gpuHist.push(p.gpu_w ?? 0); if (gpuHist.length > 60) gpuHist.shift();
    const gmax = Math.max(20, ...gpuHist);
    document.querySelector('#gpu-spark polyline').setAttribute('points', spark(gpuHist, gmax));
  } else {
    $('gpu-util').textContent = '—';
    $('gpu-bar').querySelector('i').style.width = '0%';
    $('gpu-thermal').textContent = '未启用';
    $('gpu-sub').innerHTML = `<span class="mut">需 sudo：<code>sudo .venv/bin/python -m naga.powermon</code></span>`;
  }
}
let gpuHist = [];
setInterval(pollHw, 1500); pollHw();
</script>
</body>
</html>
