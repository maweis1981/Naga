<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Naga</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --user: #2b5cff; --assist: #1e2330;
    --text: #e6e8ee; --muted: #8b93a7; --line: #262b36; --side: #12141a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.6 -apple-system, "SF Pro", "PingFang SC", system-ui, sans-serif;
  }
  /* 整体：左侧栏 + 右主区 */
  .app { display: flex; height: 100%; }
  aside {
    width: 260px; background: var(--side); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  aside .top { padding: 12px; }
  aside .newbtn {
    width: 100%; background: var(--user); color: #fff; border: none; border-radius: 9px;
    padding: 10px; font: inherit; font-weight: 600; cursor: pointer;
  }
  aside .newbtn:hover { filter: brightness(1.08); }
  aside .chats { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .chatitem {
    padding: 9px 10px; border-radius: 8px; cursor: pointer; display: flex;
    align-items: center; gap: 8px; color: var(--muted); font-size: 13.5px;
  }
  .chatitem:hover { background: #1b1e26; color: var(--text); }
  .chatitem.active { background: #222736; color: var(--text); }
  .chatitem .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chatitem .del { opacity: 0; border: none; background: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 5px; }
  .chatitem:hover .del { opacity: 1; }
  .chatitem .del:hover { color: #ff6b6b; background: #2a1c1c; }
  aside .foot { padding: 10px 14px; border-top: 1px solid var(--line); color: var(--muted);
    font-size: 12px; display: flex; gap: 14px; }
  aside .foot a { color: var(--muted); text-decoration: none; }
  aside .foot a:hover { color: var(--text); }
  /* 主区 */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header {
    padding: 10px 18px; border-bottom: 1px solid var(--line); display: flex;
    align-items: center; gap: 12px; background: var(--panel);
  }
  header .brand { display: flex; align-items: center; gap: 9px; }
  header .brand b { font-size: 16px; letter-spacing: .3px; font-weight: 700; }
  header .modelsel { background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 7px; padding: 4px 8px; font: inherit; font-size: 13px; max-width: 240px; }
  header .spacer { flex: 1; }
  header label { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  header input[type=range] { width: 90px; }
  button.ghost { background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 7px; padding: 5px 10px; cursor: pointer; }
  button.ghost:hover { color: var(--text); }
  #chat { flex: 1; overflow-y: auto; padding: 22px 0; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 18px; }
  .empty { color: var(--muted); text-align: center; margin-top: 18vh; }
  .msg { display: flex; margin: 14px 0; }
  .msg.user { justify-content: flex-end; }
  /* 气泡的宽度上限放在外层列容器上（相对 .msg=.wrap 的确定宽度），
     避免"气泡 80% 相对收缩包裹的父级"造成宽度塌缩、中文逐字竖排。 */
  .msg > div { max-width: 80%; min-width: 0; }
  .bubble { padding: 11px 15px; border-radius: 14px; max-width: 100%; white-space: pre-wrap;
    word-break: break-word; }
  .user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
  .assist .bubble { background: var(--assist); border: 1px solid var(--line);
    border-bottom-left-radius: 4px; }
  .role { font-size: 11px; color: var(--muted); margin: 0 4px 4px; }
  /* 自研 Markdown 渲染的元素样式 */
  .content p { margin: 6px 0; }
  .content h1,.content h2,.content h3,.content h4 { margin: 10px 0 6px; line-height: 1.3; }
  .content h1 { font-size: 1.5em; } .content h2 { font-size: 1.3em; }
  .content h3 { font-size: 1.15em; } .content h4 { font-size: 1.05em; }
  .content ul,.content ol { margin: 6px 0; padding-left: 22px; }
  .content li { margin: 2px 0; }
  .content a { color: #6ea8ff; }
  .content code.inline { background: #0d1017; border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 5px; font-family: ui-monospace, Menlo, monospace; font-size: .9em; }
  .content pre { background: #0d1017; border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
  .content pre code { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; white-space: pre; }
  .content blockquote { border-left: 3px solid var(--line); margin: 8px 0; padding: 2px 12px; color: var(--muted); }
  .content hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
  .md-table { border-collapse: collapse; margin: 8px 0; font-size: 13.5px; width: 100%; }
  .md-table th,.md-table td { border: 1px solid var(--line); padding: 5px 10px; text-align: left; }
  .md-table th { background: #0d1017; font-weight: 600; }
  .md-table tbody tr:nth-child(even) td { background: rgba(255,255,255,.02); }
  /* LaTeX 子集 */
  .math { font-style: italic; font-family: "Cambria Math", Georgia, serif; }
  .math-block { text-align: center; margin: 10px 0; font-size: 1.05em; }
  .frac { display: inline-flex; flex-direction: column; vertical-align: middle;
    text-align: center; font-size: .85em; }
  .frac-n { border-bottom: 1px solid currentColor; padding: 0 4px; }
  .frac-d { padding: 0 4px; }
  .sqrt-r { border-top: 1px solid currentColor; padding: 0 2px; }
  /* 工具调用折叠块：小字、muted、默认收起 */
  .toolcall { margin: 6px 0; border: 1px solid var(--line); border-radius: 8px;
    background: #14171e; font-size: 12px; color: var(--muted); }
  .toolcall > summary { cursor: pointer; padding: 5px 9px; list-style: none;
    user-select: none; color: var(--muted); }
  .toolcall > summary::-webkit-details-marker { display: none; }
  .toolcall > summary::before { content: "▸ "; }
  .toolcall[open] > summary::before { content: "▾ "; }
  .toolcall .tcbody { padding: 4px 10px 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #9aa3b6; }
  .cursor::after { content: "▍"; animation: blink 1s steps(2) infinite; color: var(--muted); }
  @keyframes blink { 50% { opacity: 0; } }
  footer { border-top: 1px solid var(--line); background: var(--panel); padding: 14px 0; }
  .composer { max-width: 760px; margin: 0 auto; padding: 0 18px; display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; font: inherit; max-height: 160px;
  }
  textarea:focus { outline: none; border-color: var(--user); }
  button.send { background: var(--user); color: #fff; border: none; border-radius: 12px;
    padding: 0 20px; font-weight: 600; cursor: pointer; }
  button.send:disabled { opacity: .5; cursor: default; }
  .meta { max-width: 760px; margin: 6px auto 0; padding: 0 18px; color: var(--muted); font-size: 12px; }
  .preview { max-width: 760px; margin: 0 auto 8px; padding: 0 18px; display: flex; align-items: center; gap: 10px; }
  .preview img { height: 56px; border-radius: 8px; border: 1px solid var(--line); }
  .attach { align-self: flex-end; height: 44px; font-size: 16px; }
  .bubble img { max-width: 240px; border-radius: 10px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="app">
    <!-- 左侧：会话列表 -->
    <aside>
      <div class="top"><button class="newbtn" id="new">＋ 新会话</button></div>
      <div class="chats" id="chats"></div>
      <div class="foot">
        <a href="/monitor" title="引擎监视器">📊 监视器</a>
        <a href="/settings" title="模型管理与设置">⚙ 设置</a>
      </div>
    </aside>

    <!-- 右侧：聊天主区 -->
    <main>
      <header>
        <div class="brand">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <defs><linearGradient id="ng" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0" stop-color="#2b6bff"/><stop offset="1" stop-color="#9b3cff"/>
            </linearGradient></defs>
            <rect width="32" height="32" rx="8" fill="url(#ng)"/>
            <path d="M9.5 22.5 V9.5 L22.5 22.5 V9.5" stroke="#fff" stroke-width="2.6"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="22.5" cy="9.5" r="2" fill="#fff"/>
          </svg>
          <b>Naga</b>
        </div>
        <select class="modelsel" id="model" title="切换模型"></select>
        <span class="spacer"></span>
        <label>温度 <input type="range" id="temp" min="0" max="1.5" step="0.1" value="0.7" />
          <span id="tempv">0.7</span></label>
      </header>

      <div id="chat"><div class="wrap" id="list"></div></div>

      <footer>
        <div class="preview" id="preview" style="display:none"></div>
        <div class="composer">
          <button class="ghost attach" id="attach" title="上传图片">📎</button>
          <input type="file" id="file" accept="image/*" hidden />
          <textarea id="input" rows="1" placeholder="说点什么…（📎 传图，Enter 发送，Shift+Enter 换行）"></textarea>
          <button class="send" id="send">发送</button>
        </div>
        <div class="meta" id="meta"></div>
      </footer>
    </main>
  </div>

<script src="/naga-render.js"></script>
<script>
const list = document.getElementById('list');
const chatsEl = document.getElementById('chats');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const meta = document.getElementById('meta');
const tempEl = document.getElementById('temp');
const tempv = document.getElementById('tempv');
let messages = [];       // 当前会话的完整历史（每轮发全量给后端）
let convId = null;       // 当前会话 id（null = 尚未落盘的空会话）
let busy = false;
let pendingImage = null;

tempEl.oninput = () => tempv.textContent = tempEl.value;

// ---------- 会话侧边栏 ----------
async function loadChats() {
  try {
    const d = await (await fetch('/api/chats')).json();
    chatsEl.innerHTML = '';
    for (const c of d.chats) {
      const it = document.createElement('div');
      it.className = 'chatitem' + (c.id === convId ? ' active' : '');
      const t = document.createElement('div');
      t.className = 't'; t.textContent = c.title || '新会话';
      const del = document.createElement('button');
      del.className = 'del'; del.textContent = '🗑'; del.title = '删除会话';
      del.onclick = (e) => { e.stopPropagation(); deleteChat(c.id); };
      it.appendChild(t); it.appendChild(del);
      it.onclick = () => openChat(c.id);
      chatsEl.appendChild(it);
    }
  } catch (e) {}
}

async function openChat(id) {
  if (busy) return;
  const conv = await (await fetch('/api/chats/' + id)).json();
  convId = conv.id;
  messages = conv.messages || [];
  renderMessages();
  loadChats();
}

function newChat() {
  if (busy) return;
  convId = null; messages = []; renderMessages(); loadChats();
  input.focus();
}

async function deleteChat(id) {
  await fetch('/api/chats/' + id, { method: 'DELETE' });
  if (id === convId) newChat();
  else loadChats();
}

// 每轮结束后把当前会话整段存回后端；新会话先创建拿 id
async function persist() {
  try {
    if (!convId) {
      const conv = await (await fetch('/api/chats', { method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: modelSel.value }) })).json();
      convId = conv.id;
    }
    await fetch('/api/chats/' + convId, { method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, model: modelSel.value }) });
    loadChats();
  } catch (e) {}
}

// ---------- 渲染 ----------
function renderMessages() {
  list.innerHTML = '';
  if (!messages.length) {
    const e = document.createElement('div');
    e.className = 'empty'; e.textContent = '开始一段新对话吧';
    list.appendChild(e); meta.textContent = ''; return;
  }
  for (const m of messages) {
    let text = m.content, img = null;
    if (Array.isArray(m.content)) {
      img = (m.content.find(c => c.type === 'image_url') || {}).image_url?.url || null;
      text = m.content.filter(c => c.type === 'text').map(c => c.text).join('');
    }
    addBubble(m.role === 'user' ? 'user' : 'assistant', text, img);
  }
}

function addBubble(role, text, imageUrl) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  const col = document.createElement('div');
  const tag = document.createElement('div');
  tag.className = 'role';
  tag.textContent = role === 'user' ? '你' : 'Naga';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (imageUrl) { const im = document.createElement('img'); im.src = imageUrl; bubble.appendChild(im); }
  const content = document.createElement('div');
  content.className = 'content';
  renderMd(content, text, role);
  bubble.appendChild(content);
  col.appendChild(tag); col.appendChild(bubble); msg.appendChild(col);
  list.appendChild(msg);
  scrollDown();
  return content;   // 流式时对 content 重新渲染
}
// 用户消息保持纯文本；助手消息走自研 Markdown/LaTeX/工具折叠渲染
function renderMd(el, text, role) {
  if (role === 'user') { el.textContent = text; return; }
  if (window.NagaRender) NagaRender.render(el, text);
  else el.textContent = text;
}
function scrollDown() { const c = document.getElementById('chat'); c.scrollTop = c.scrollHeight; }

// ---------- 图片上传 ----------
const fileInput = document.getElementById('file');
document.getElementById('attach').onclick = () => fileInput.click();
fileInput.onchange = () => {
  const f = fileInput.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => { pendingImage = r.result; showPreview(); };
  r.readAsDataURL(f);
};
function showPreview() {
  const p = document.getElementById('preview');
  if (!pendingImage) { p.style.display = 'none'; p.innerHTML = ''; return; }
  p.style.display = 'flex'; p.innerHTML = '';
  const im = document.createElement('img'); im.src = pendingImage;
  const x = document.createElement('button'); x.className = 'ghost'; x.textContent = '× 移除';
  x.onclick = () => { pendingImage = null; fileInput.value = ''; showPreview(); };
  p.appendChild(im); p.appendChild(x);
}

// ---------- 模型下拉 ----------
const modelSel = document.getElementById('model');
async function loadModels() {
  try {
    const d = await (await fetch('/v1/models')).json();
    modelSel.innerHTML = '';
    for (const m of d.data) {
      const o = document.createElement('option');
      o.value = m.id;
      o.textContent = m.id.split('/').pop() + (m.type === 'llava' ? ' 👁' : '');
      if (m.active) o.selected = true;
      modelSel.appendChild(o);
    }
  } catch (e) {}
}
modelSel.onchange = async () => {
  modelSel.disabled = true;
  await fetch('/admin/load', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: modelSel.value }) });
  modelSel.disabled = false;
  loadModels();
};

// ---------- 发送 ----------
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});
document.getElementById('new').onclick = newChat;
sendBtn.onclick = send;

async function send() {
  const text = input.value.trim();
  if ((!text && !pendingImage) || busy) return;
  busy = true; sendBtn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  if (list.querySelector('.empty')) list.innerHTML = '';

  const img = pendingImage;
  const content = img
    ? [{ type: 'image_url', image_url: { url: img } }, { type: 'text', text }]
    : text;
  messages.push({ role: 'user', content });
  addBubble('user', text, img);
  pendingImage = null; fileInput.value = ''; showPreview();

  const bubble = addBubble('assistant', '');
  bubble.classList.add('cursor');
  let acc = '';
  const t0 = performance.now();

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelSel.value || 'naga', stream: true,
        temperature: parseFloat(tempEl.value),
        messages: messages.map((m, i) =>
          (Array.isArray(m.content) && i !== messages.length - 1)
            ? { role: m.role, content: m.content.filter(c => c.type === 'text').map(c => c.text).join('') }
            : m),
      }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf('\n\n')) >= 0) {
        const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (payload === '[DONE]') continue;
        const delta = JSON.parse(payload).choices?.[0]?.delta?.content;
        if (delta) { acc += delta; renderMd(bubble, acc, 'assistant'); scrollDown(); }
      }
    }
  } catch (err) {
    bubble.textContent = acc + '\n[错误] ' + err;
  }

  bubble.classList.remove('cursor');
  messages.push({ role: 'assistant', content: acc });
  const dt = (performance.now() - t0) / 1000;
  meta.textContent = `${acc.length} 字 · ${dt.toFixed(1)}s`;
  busy = false; sendBtn.disabled = false; input.focus();
  persist();               // 落盘当前会话（含刚完成的这轮）
}

// ---------- 启动：加载模型 + 会话列表，打开最近一个会话 ----------
(async function init() {
  await loadModels();
  const d = await (await fetch('/api/chats')).json().catch(() => ({ chats: [] }));
  if (d.chats && d.chats.length) openChat(d.chats[0].id);
  else renderMessages();
})();
</script>
</body>
</html>
